<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DataMind AutoML{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <nav class="glass-nav">
        <div class="nav-container">
            <a href="/" class="brand">
                <span class="brand-icon">⚡</span>
                <span class="brand-text">DataMind</span>
            </a>
            <ul class="nav-links">
                <li><a href="/" class="{{ 'active' if request.path == '/' else '' }}">Home</a></li>
                <li><a href="/services" class="{{ 'active' if request.path == '/services' else '' }}">Services</a></li>
                <li><a href="/contact" class="{{ 'active' if request.path == '/contact' else '' }}">Contact</a></li>
                <li><a href="/login" class="btn btn-primary btn-sm">Login</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="glass-footer">
        <div class="footer-content">
            <p>&copy; 2026 DataMind AutoML. All rights reserved.</p>
            <ul class="footer-links">
                <li><a href="/privacy">Privacy Policy</a></li>
                <li><a href="/contact">Support</a></li>
            </ul>
        </div>
    </footer>

    {% block scripts %}
    {% endblock %}
</body>
</html>
