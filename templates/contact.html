{% extends "base.html" %}

{% block title %}Contact Support - DataMind{% endblock %}

{% block content %}
<div class="contact-container fade-in">
    <div class="contact-header center-align">
        <h2>Get in Touch</h2>
        <p>Interested in our enterprise AutoML solutions or need support? Drop us a line.</p>
    </div>
    
    <div class="glass-card contact-card">
        <form class="contact-form" onsubmit="event.preventDefault(); alert('Message sent successfully. Our team will contact you shortly.');">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="Jane Doe" required>
            </div>
            <div class="form-group">
                <label for="email">Work Email</label>
                <input type="email" id="email" class="form-control" placeholder="jane@company.com" required>
            </div>
            <div class="form-group">
                <label for="subject">Subject</label>
                <select id="subject" class="form-control" required>
                    <option value="" disabled selected>Select an option</option>
                    <option value="sales">Sales Inquiry</option>
                    <option value="support">Technical Support</option>
                    <option value="billing">Billing</option>
                </select>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" class="form-control" rows="5" placeholder="How can we help?" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-3">Send Message</button>
        </form>
    </div>
</div>
{% endblock %}
