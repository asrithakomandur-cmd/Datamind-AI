{% extends "base.html" %}

{% block title %}Login - DataMind AutoML{% endblock %}

{% block content %}
<div class="auth-container fade-in">
    <div class="glass-card login-card">
        <div class="card-header center-align">
            <h2>Welcome Back</h2>
            <p>Sign in to continue to DataMind</p>
        </div>
        <form class="auth-form" onsubmit="event.preventDefault(); alert('Demo: Login functionality simulated.'); window.location.href='/';">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" id="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="form-options">
                <label class="checkbox-container">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-3">Sign In</button>
        </form>
        <div class="auth-footer center-align mt-4">
            <p>Don't have an account? <a href="#" class="highlight">Sign up</a></p>
        </div>
    </div>
</div>
{% endblock %}
